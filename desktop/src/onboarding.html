<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:*; img-src 'self' data: file: http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;">
    <title>Lynn</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
    <style>
        html, body, #react-root {
            height: 100%;
        }
        body {
            background: var(--bg);
            background-image: var(--bg-texture, none);
            background-repeat: repeat;
            background-size: 400px;
            overflow: hidden;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="react-root"></div>
    <!-- Windows/Linux 自绘窗口控制按钮注入点：放在 react-root 之后，避免被内容层覆盖 -->
    <div class="titlebar titlebar-minimal"></div>

    <script src="lib/i18n.js"></script>
    <script src="lib/theme.js"></script>
    <script src="modules/platform.js"></script>
    <script type="module" src="./onboarding-main.tsx"></script>

</html>
